<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: #1A1A1A; stroke: #F26522; stroke-width: 2; }
    .label { fill: white; font-family: sans-serif; font-size: 12; font-weight: bold; }
    .data-packet { fill: #F26522; }
  </style>

  <!-- Nodes -->
  <rect x="10" y="30" width="80" height="40" rx="8" class="node" />
  <text x="50" y="55" text-anchor="middle" class="label">CLIENT</text>

  <rect x="160" y="30" width="80" height="40" rx="8" class="node" />
  <text x="200" y="55" text-anchor="middle" class="label">SERVER</text>

  <rect x="310" y="30" width="80" height="40" rx="8" class="node" />
  <text x="350" y="55" text-anchor="middle" class="label">DB</text>

  <!-- Connecting Lines -->
  <line x1="90" y1="50" x2="160" y2="50" stroke="#333" stroke-width="2" />
  <line x1="240" y1="50" x2="310" y2="50" stroke="#333" stroke-width="2" />

  <!-- Animated Data Packets -->
  <circle r="4" class="data-packet">
    <animateMotion path="M 90 50 L 160 50" dur="1s" repeatCount="indefinite" />
  </circle>

  <circle r="4" class="data-packet">
    <animateMotion path="M 240 50 L 310 50" dur="1.2s" repeatCount="indefinite" />
    <animate attributeName="fill" values="#F26522;#00C786;#F26522" dur="2s" repeatCount="indefinite" />
  </circle>

  <circle r="4" class="data-packet">
    <animateMotion path="M 160 50 L 90 50" dur="1.5s" begin="0.5s" repeatCount="indefinite" />
    <animate attributeName="fill" values="#00BAFF;#F26522;#00BAFF" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
