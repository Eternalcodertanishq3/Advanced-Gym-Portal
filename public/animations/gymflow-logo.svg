      <rect x="0" y="28" style="animation-delay: 2.92s;" class="pixel"/>
      <rect x="0" y="14" style="animation-delay: 2.96s;" class="pixel"/>
      <rect x="14" y="0" style="animation-delay: 3.00s;" class="pixel"/>
      <rect x="28" y="0" style="animation-delay: 3.04s;" class="pixel"/>
      <rect x="42" y="0" style="animation-delay: 3.08s;" class="pixel"/>
      <rect x="56" y="14" style="animation-delay: 3.12s;" class="pixel"/>
      <rect x="56" y="28" style="animation-delay: 3.16s;" class="pixel"/>
      <rect x="56" y="42" style="animation-delay: 3.20s;" class="pixel"/>
      <rect x="56" y="56" style="animation-delay: 3.24s;" class="pixel"/>
      <rect x="56" y="70" style="animation-delay: 3.28s;" class="pixel"/>
      <rect x="42" y="84" style="animation-delay: 3.32s;" class="pixel"/>
      <rect x="28" y="84" style="animation-delay: 3.36s;" class="pixel"/>
      <rect x="14" y="84" style="animation-delay: 3.40s;" class="pixel"/>
    </g>

    <!-- Letter W (Offset: x=504) -->
    <g class="w-letter" transform="translate(504, 0)">
      <rect x="0" y="0" style="animation-delay: 3.44s;" class="pixel"/>
      <rect x="0" y="14" style="animation-delay: 3.48s;" class="pixel"/>
      <rect x="0" y="28" style="animation-delay: 3.52s;" class="pixel"/>
      <rect x="0" y="42" style="animation-delay: 3.56s;" class="pixel"/>
      <rect x="0" y="56" style="animation-delay: 3.60s;" class="pixel"/>
      <rect x="0" y="70" style="animation-delay: 3.64s;" class="pixel"/>
      <rect x="0" y="84" style="animation-delay: 3.68s;" class="pixel"/>
      <rect x="14" y="70" style="animation-delay: 3.72s;" class="pixel"/>
      <rect x="28" y="56" style="animation-delay: 3.76s;" class="pixel"/>
      <rect x="42" y="70" style="animation-delay: 3.80s;" class="pixel"/>
      <rect x="56" y="84" style="animation-delay: 3.84s;" class="pixel"/>
      <rect x="56" y="70" style="animation-delay: 3.88s;" class="pixel"/>
      <rect x="56" y="56" style="animation-delay: 3.92s;" class="pixel"/>
      <rect x="56" y="42" style="animation-delay: 3.96s;" class="pixel"/>
      <rect x="56" y="28" style="animation-delay: 4.00s;" class="pixel"/>
      <rect x="56" y="14" style="animation-delay: 4.04s;" class="pixel"/>
      <rect x="56" y="0" style="animation-delay: 4.08s;" class="pixel"/>
    </g>

  </g>
</svg>
