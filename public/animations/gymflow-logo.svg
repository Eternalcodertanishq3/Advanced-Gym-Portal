<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <style>
    .pixel {
      width: 12px;
      height: 12px;
      rx: 2px;
      fill: #1d1d1f;
      stroke: #121214;
      stroke-width: 1px;
      animation: nokiaSnake 4.5s linear infinite;
    }

    @keyframes nokiaSnake {
      0% {
        fill: #1d1d1f;
        filter: none;
      }
      0.1%, 12% {
        fill: #F26522;
        filter: drop-shadow(0 0 8px #F26522);
      }
      13%, 35% {
        fill: #5e280c;
        filter: drop-shadow(0 0 2px #5e280c);
      }
      36%, 100% {
        fill: #1d1d1f;
        filter: none;
      }
    }

    .wave-group {
      transform-origin: center;
    }
  </style>

  <!-- Background container -->
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Centered GymFlow nokia snake block-pixel text (Offset: x=114, y=55) -->
  <g class="wave-group" transform="translate(114, 55)">
    
    <!-- Letter G (Offset: x=0) -->
    <g class="g-letter" transform="translate(0, 0)">
      <rect x="56" y="0" style="animation-delay: 0.00s;" class="pixel"/>
      <rect x="42" y="0" style="animation-delay: 0.04s;" class="pixel"/>
      <rect x="28" y="0" style="animation-delay: 0.08s;" class="pixel"/>
      <rect x="14" y="0" style="animation-delay: 0.12s;" class="pixel"/>
      <rect x="0" y="14" style="animation-delay: 0.16s;" class="pixel"/>
      <rect x="0" y="28" style="animation-delay: 0.20s;" class="pixel"/>
      <rect x="0" y="42" style="animation-delay: 0.24s;" class="pixel"/>
      <rect x="28" y="42" style="animation-delay: 0.28s;" class="pixel"/>
      <rect x="42" y="42" style="animation-delay: 0.32s;" class="pixel"/>
      <rect x="56" y="42" style="animation-delay: 0.36s;" class="pixel"/>
      <rect x="56" y="56" style="animation-delay: 0.40s;" class="pixel"/>
      <rect x="56" y="70" style="animation-delay: 0.44s;" class="pixel"/>
      <rect x="56" y="84" style="animation-delay: 0.48s;" class="pixel"/>
      <rect x="42" y="84" style="animation-delay: 0.52s;" class="pixel"/>
      <rect x="28" y="84" style="animation-delay: 0.56s;" class="pixel"/>
      <rect x="14" y="84" style="animation-delay: 0.60s;" class="pixel"/>
      <rect x="0" y="70" style="animation-delay: 0.64s;" class="pixel"/>
      <rect x="0" y="56" style="animation-delay: 0.68s;" class="pixel"/>
    </g>

    <!-- Letter Y (Offset: x=84) -->
    <g class="y-letter" transform="translate(84, 0)">
      <rect x="0" y="0" style="animation-delay: 0.72s;" class="pixel"/>
      <rect x="0" y="14" style="animation-delay: 0.76s;" class="pixel"/>
      <rect x="14" y="28" style="animation-delay: 0.80s;" class="pixel"/>
      <rect x="28" y="42" style="animation-delay: 0.84s;" class="pixel"/>
      <rect x="28" y="56" style="animation-delay: 0.88s;" class="pixel"/>
      <rect x="28" y="70" style="animation-delay: 0.92s;" class="pixel"/>
      <rect x="28" y="84" style="animation-delay: 0.96s;" class="pixel"/>
      <rect x="42" y="28" style="animation-delay: 1.00s;" class="pixel"/>
      <rect x="56" y="14" style="animation-delay: 1.04s;" class="pixel"/>
      <rect x="56" y="0" style="animation-delay: 1.08s;" class="pixel"/>
    </g>

    <!-- Letter M (Offset: x=168) -->
    <g class="m-letter" transform="translate(168, 0)">
      <rect x="0" y="84" style="animation-delay: 1.12s;" class="pixel"/>
      <rect x="0" y="70" style="animation-delay: 1.16s;" class="pixel"/>
      <rect x="0" y="56" style="animation-delay: 1.20s;" class="pixel"/>
      <rect x="0" y="42" style="animation-delay: 1.24s;" class="pixel"/>
      <rect x="0" y="28" style="animation-delay: 1.28s;" class="pixel"/>
      <rect x="0" y="14" style="animation-delay: 1.32s;" class="pixel"/>
      <rect x="0" y="0" style="animation-delay: 1.36s;" class="pixel"/>
      <rect x="14" y="14" style="animation-delay: 1.40s;" class="pixel"/>
      <rect x="28" y="28" style="animation-delay: 1.44s;" class="pixel"/>
      <rect x="42" y="14" style="animation-delay: 1.48s;" class="pixel"/>
      <rect x="56" y="0" style="animation-delay: 1.52s;" class="pixel"/>
      <rect x="56" y="14" style="animation-delay: 1.56s;" class="pixel"/>
      <rect x="56" y="28" style="animation-delay: 1.60s;" class="pixel"/>
      <rect x="56" y="42" style="animation-delay: 1.64s;" class="pixel"/>
      <rect x="56" y="56" style="animation-delay: 1.68s;" class="pixel"/>
      <rect x="56" y="70" style="animation-delay: 1.72s;" class="pixel"/>
      <rect x="56" y="84" style="animation-delay: 1.76s;" class="pixel"/>
    </g>

    <!-- Letter F (Offset: x=252) -->
    <g class="f-letter" transform="translate(252, 0)">
      <rect x="0" y="84" style="animation-delay: 1.80s;" class="pixel"/>
      <rect x="0" y="70" style="animation-delay: 1.84s;" class="pixel"/>
      <rect x="0" y="56" style="animation-delay: 1.88s;" class="pixel"/>
      <rect x="0" y="42" style="animation-delay: 1.92s;" class="pixel"/>
      <rect x="14" y="42" style="animation-delay: 1.96s;" class="pixel"/>
      <rect x="28" y="42" style="animation-delay: 2.00s;" class="pixel"/>
      <rect x="42" y="42" style="animation-delay: 2.04s;" class="pixel"/>
      <rect x="0" y="28" style="animation-delay: 2.08s;" class="pixel"/>
      <rect x="0" y="14" style="animation-delay: 2.12s;" class="pixel"/>
      <rect x="0" y="0" style="animation-delay: 2.16s;" class="pixel"/>
      <rect x="14" y="0" style="animation-delay: 2.20s;" class="pixel"/>
      <rect x="28" y="0" style="animation-delay: 2.24s;" class="pixel"/>
      <rect x="42" y="0" style="animation-delay: 2.28s;" class="pixel"/>
      <rect x="56" y="0" style="animation-delay: 2.32s;" class="pixel"/>
    </g>

    <!-- Letter L (Offset: x=336) -->
    <g class="l-letter" transform="translate(336, 0)">
      <rect x="0" y="0" style="animation-delay: 2.36s;" class="pixel"/>
      <rect x="0" y="14" style="animation-delay: 2.40s;" class="pixel"/>
      <rect x="0" y="28" style="animation-delay: 2.44s;" class="pixel"/>
      <rect x="0" y="42" style="animation-delay: 2.48s;" class="pixel"/>
      <rect x="0" y="56" style="animation-delay: 2.52s;" class="pixel"/>
      <rect x="0" y="70" style="animation-delay: 2.56s;" class="pixel"/>
      <rect x="0" y="84" style="animation-delay: 2.60s;" class="pixel"/>
      <rect x="14" y="84" style="animation-delay: 2.64s;" class="pixel"/>
