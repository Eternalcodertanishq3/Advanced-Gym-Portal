      <rect x="12" y="72" width="10" height="10" rx="2" class="pixel"/>
      <rect x="24" y="72" width="10" height="10" rx="2" class="pixel"/>
      <rect x="36" y="72" width="10" height="10" rx="2" class="pixel"/>
      <rect x="48" y="72" width="10" height="10" rx="2" class="pixel"/>
    </g>

    <!-- Letter Y (Offset: x=84) -->
