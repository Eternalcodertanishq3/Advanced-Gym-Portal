<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F26522;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9F43;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Glow Circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#F26522" stroke-width="2" opacity="0.3" filter="url(#glow)">
    <animate attributeName="r" values="80;95;80" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Inner Pulse -->
  <circle cx="100" cy="100" r="60" fill="url(#grad1)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite" />
    <animate attributeName="r" values="60;65;60" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Eagle Icon Placeholder (Stylized V) -->
  <path d="M60 80 L100 130 L140 80" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="4s" repeatCount="indefinite" />
  </path>
  
  <text x="100" y="160" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="14">
    SYSTEM ACTIVE
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
  </text>
</svg>
