<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="radarGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F26522" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#F26522" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Background Circles -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="100" cy="100" r="60" fill="none" stroke="#333" stroke-width="1" />
  <circle cx="100" cy="100" r="30" fill="none" stroke="#333" stroke-width="1" />
  
  <!-- Crosshair -->
  <line x1="100" y1="10" x2="100" y2="190" stroke="#333" stroke-width="1" />
  <line x1="10" y1="100" x2="190" y2="100" stroke="#333" stroke-width="1" />

  <!-- Scanning Hand -->
  <g>
    <rect x="100" y="10" width="100" height="90" fill="url(#radarGrad)">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="4s" repeatCount="indefinite" />
    </rect>
    <line x1="100" y1="100" x2="100" y2="10" stroke="#F26522" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="4s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- Blips -->
  <circle cx="150" cy="60" r="3" fill="#F26522">
    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="0.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="70" cy="140" r="3" fill="#F26522">
    <animate attributeName="opacity" values="0;1;0" dur="4s" begin="2.5s" repeatCount="indefinite" />
  </circle>
  
  <text x="100" y="190" text-anchor="middle" fill="#F26522" font-family="monospace" font-size="10" font-weight="bold">
    SCANNING ECOSYSTEM...
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
  </text>
</svg>
